name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-compose:
    runs-on: ubuntu-latest

    env:
      # Variables (non-secret)
      DB_NAME: ${{ vars.DB_NAME }}
      DB_USER: ${{ vars.DB_USER }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_HOST: ${{ vars.DB_HOST }}
      APP_PORT: ${{ vars.APP_PORT }}

      # Secrets
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Create .env for docker compose (from GH vars/secrets)
        run: |
          cat > .env << 'EOF'
          DB_NAME=${DB_NAME}
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          DB_PORT=${DB_PORT}
          DB_HOST=${DB_HOST}
          APP_PORT=${APP_PORT}
          EOF

      - name: Docker compose up
        run: docker compose -f docker-compose.lab2.yml --env-file .env up -d --build

      - name: Wait for web health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/health > /dev/null; then
              echo "Web is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Web did not become healthy in time"
          docker compose -f docker-compose.lab2.yml logs --tail 200 web
          exit 1

      - name: Functional checks (curl)
        run: |
          curl -i http://127.0.0.1:8080/health
          curl -I http://127.0.0.1:8080/Tasks

      - name: Docker compose down
        if: always()
        run: docker compose -f docker-compose.lab2.yml down -v
services:
  web1:
    build:
      context: .
      dockerfile: NodeInfo.Web/Dockerfile
    environment:
      NODE_ID: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  web2:
    build:
      context: .
      dockerfile: NodeInfo.Web/Dockerfile
    environment:
      NODE_ID: "2"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  web3:
    build:
      context: .
      dockerfile: NodeInfo.Web/Dockerfile
    environment:
      NODE_ID: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  nginx:
    image: nginx:alpine
    container_name: tasktracker-lb
    depends_on:
      web1:
        condition: service_healthy
      web2:
        condition: service_healthy
      web3:
        condition: service_healthy
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro